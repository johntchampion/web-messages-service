# ============================================================
# pg_hba.conf — managed by the web-messages-db image
# ============================================================
# This file is intentionally version-controlled and baked into
# the image. Postgres is started with `-c hba_file=` pointing
# here (see docker-compose.yml), so it is the authoritative
# client-auth config and is NOT the mutable copy inside the
# data volume. Rules are matched top-to-bottom, first match wins.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local unix-socket connections (in-container psql, pg_isready healthcheck)
local   all             all                                     trust

# Loopback
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker bridge networks (RFC 1918). The app reaches the DB over the
# compose network, e.g. 172.18.0.x — password (scram-sha-256) required.
host    all             all             10.0.0.0/8              scram-sha-256
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# Replication (loopback only, password required)
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            scram-sha-256
host    replication     all             ::1/128                 scram-sha-256
